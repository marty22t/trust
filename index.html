<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRUST - لوحة التحكم</title>
    <style>
        body { background-color: #0b0e11; color: white; font-family: sans-serif; margin: 0; padding: 0; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .card { background: #1e2329; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .balance { font-size: 35px; font-weight: bold; color: #f3ba2f; margin: 10px 0; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #474d57; background: #2b2f36; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; background: #f3ba2f; color: black; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        #auth-section, #app-section { display: none; }
        #status { color: #f6465d; font-size: 13px; margin-top: 10px; }
        .ref-box { background: #2b2f36; padding: 10px; border-radius: 8px; font-size: 12px; border: 1px dashed #f3ba2f; margin-top: 10px; word-break: break-all; }
    </style>
</head>
<body>

<div class="container">
    <!-- واجهة الدخول -->
    <div id="auth-section" class="card">
        <h2 style="color:#f3ba2f; letter-spacing: 2px;">TRUST</h2>
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button onclick="handleAuth()">دخول / تسجيل جديد</button>
        <div id="status"></div>
    </div>

    <!-- واجهة المنصة -->
    <div id="app-section">
        <div class="card">
            <h2 style="color:#f3ba2f; margin-bottom:5px;">TRUST</h2>
            <div style="font-size:12px; color:#848e9c;">رصيدك المتوفر</div>
            <div class="balance" id="user-balance">0.00 USDT</div>
        </div>

        <div class="card">
            <h4>تداول المهمة الحالية</h4>
            <div class="btn-group">
                <button style="background:#2ebd85; color:white" onclick="alert('تم إرسال طلب Long بنجاح')">LONG</button>
                <button style="background:#f6465d; color:white" onclick="alert('تم إرسال طلب Short بنجاح')">SHORT</button>
            </div>
        </div>

        <div class="card">
            <h4>نظام الإحالة</h4>
            <div style="font-size:14px;">إجمالي الإحالات: <span id="ref-count" style="color:#f3ba2f">0</span></div>
            <div class="ref-box" id="ref-link">جاري تحميل رابطك...</div>
        </div>

        <button onclick="logout()" style="background:none; color:grey; font-size:12px;">تسجيل الخروج</button>
    </div>
</div>

<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>

<script>
    // مفاتيح Firebase الخاصة بك مدمجة أدناه
    const firebaseConfig = {
      apiKey: "AIzaSyBm9fQ1fDvhPD2_FpA1CUskHbKpgd-FNOc",
      authDomain: "trust-d33d3.firebaseapp.com",
      projectId: "trust-d33d3",
      storageBucket: "trust-d33d3.firebasestorage.app",
      messagingSenderId: "880308194472",
      appId: "1:880308194472:web:944b9240623d4d359d469d"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    auth.onAuthStateChanged(user => {
        const authSec = document.getElementById('auth-section');
        const appSec = document.getElementById('app-section');
        if (user) {
            authSec.style.display = 'none';
            appSec.style.display = 'block';
            loadUserData(user);
        } else {
            authSec.style.display = 'block';
            appSec.style.display = 'none';
        }
    });

    async function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const status = document.getElementById('status');
        if(!email || !pass) { status.innerText = "أدخل البيانات أولاً"; return; }
        
        try {
            await auth.signInWithEmailAndPassword(email, pass);
        } catch (err) {
            try {
                const res = await auth.createUserWithEmailAndPassword(email, pass);
                await db.collection('users').doc(res.user.uid).set({
                    email: email,
                    balance: 0,
                    referralCount: 0,
                    myCode: res.user.uid.substring(0,6)
                });
            } catch (e) { status.innerText = e.message; }
        }
    }

    function loadUserData(user) {
        db.collection('users').doc(user.uid).onSnapshot(doc => {
            if(doc.exists) {
                const data = doc.data();
                document.getElementById('user-balance').innerText = (data.balance || 0).toFixed(2) + " USDT";
                document.getElementById('ref-count').innerText = data.referralCount || 0;
                document.getElementById('ref-link').innerText = window.location.origin + window.location.pathname + "?ref=" + data.myCode;
            }
        });
    }

    function logout() { auth.signOut(); }
</script>
</body>
</html>
