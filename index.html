<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRUST - منصة التداول الآمنة</title>
    <style>
        body { background-color: #0b0e11; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e2329; padding: 30px; border-radius: 20px; width: 85%; max-width: 400px; text-align: center; border: 1px solid #333; box-shadow: 0 15px 35px rgba(0,0,0,0.7); }
        .logo { color: #f3ba2f; font-size: 35px; font-weight: bold; margin-bottom: 5px; letter-spacing: 2px; }
        .slogan { color: #848e9c; font-size: 12px; margin-bottom: 25px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #474d57; background: #2b2f36; color: white; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: #f3ba2f; }
        .btn-main { width: 100%; padding: 15px; border-radius: 10px; border: none; background: #f3ba2f; color: black; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .btn-sub { background: none; color: #f3ba2f; border: none; margin-top: 15px; cursor: pointer; font-size: 14px; text-decoration: underline; }
        #status { margin-top: 15px; font-size: 13px; color: #f6465d; min-height: 18px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo">TRUST</div>
        <div class="slogan">بوابتك للتداول الذكي والآمن</div>
        
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <input type="text" id="refCode" placeholder="كود الإحالة (اختياري)">
        
        <button class="btn-main" onclick="handleAuth('login')">تسجيل الدخول</button>
        <button class="btn-sub" onclick="handleAuth('signup')">ليس لديك حساب؟ سجل الآن</button>
        <div id="status"></div>
    </div>

    <!-- مكتبات Firebase -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <script>
        // ⚠️ استبدل المعلومات التالية بالمعلومات التي نسختها من Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBm9fQ1fDvhPD2_FpA1CUskHbKpgd-FNOc",
            authDomain: "trust-d33d3.firebaseapp.com",
            projectId: "trust-d33d3",
            storageBucket: "trust-d33d3.firebasestorage.app",
            messagingSenderId: "880308194472",
            appId: "1:880308194472:web:944b9240623d4d359d469d"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        async function handleAuth(type) {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const refCode = document.getElementById('refCode').value; // كود الشخص الذي دعاك
            const status = document.getElementById('status');

            if (!email || !pass) { status.innerText = "يرجى ملء كافة البيانات"; return; }

            try {
                if (type === 'signup') {
                    const res = await auth.createUserWithEmailAndPassword(email, pass);
                    const uid = res.user.uid;
                    
                    // إنشاء بيانات المستخدم مع نظام الإحالة
                    await db.collection('users').doc(uid).set({
                        uid: uid,
                        email: email,
                        balance: 0,
                        referralCount: 0, // عدد الأشخاص الذين دعاهم
                        invitedBy: refCode || "none", // من الذي دعاه؟
                        myReferralCode: uid.substring(0, 6), // كود إحالته الخاص (أول 6 أحرف من معرفه)
                        joinedAt: new Date()
                    });

                    // إذا كان هناك كود إحالة، سنقوم بزيادة عدد إحالات الشخص الداعي
                    if (refCode) {
                        const inviterQuery = await db.collection('users').where('myReferralCode', '==', refCode).get();
                        if (!inviterQuery.empty) {
                            const inviterDoc = inviterQuery.docs[0];
                            await db.collection('users').doc(inviterDoc.id).update({
                                referralCount: firebase.firestore.FieldValue.increment(1)
                            });
                        }
                    }

                    status.style.color = "#2ebd85";
                    status.innerText = "تم إنشاء حساب TRUST بنجاح!";
                } else {
                    await auth.signInWithEmailAndPassword(email, pass);
                    status.style.color = "#2ebd85";
                    status.innerText = "جاري تحويلك للمنصة...";
                    // سنقوم بتوجيهه للصفحة الرئيسية في الخطوة القادمة
                }
            } catch (error) {
                status.innerText = "خطأ: " + error.message;
            }
        }
    </script>
</body>
</html>
