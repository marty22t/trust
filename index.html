<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRUST - لوحة التحكم</title>
    <style>
        body { background-color: #0b0e11; color: white; font-family: sans-serif; margin: 0; padding: 0; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .card { background: #1e2329; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .balance { font-size: 35px; font-weight: bold; color: #f3ba2f; margin: 10px 0; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #474d57; background: #2b2f36; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; background: #f3ba2f; color: black; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        #auth-section, #app-section, #ref-input-group { display: none; }
        #status { color: #f6465d; font-size: 13px; margin-top: 10px; }
        .toggle-auth { color: #f3ba2f; font-size: 13px; cursor: pointer; margin-top: 15px; text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <!-- قسم المصادقة -->
    <div id="auth-section" class="card">
        <h2 id="auth-title" style="color:#f3ba2f;">تسجيل الدخول</h2>
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="pass" placeholder="كلمة المرور">
        
        <!-- خانة الإحالة تظهر فقط عند إنشاء حساب جديد -->
        <div id="ref-input-group">
            <input type="text" id="referral-code" placeholder="كود الإحالة (اختياري)">
        </div>

        <button id="auth-btn" onclick="handleAuth()">دخول</button>
        <div id="status"></div>
        <div class="toggle-auth" id="toggle-btn" onclick="toggleMode()">ليس لديك حساب؟ إنشاء حساب جديد</div>
    </div>

    <!-- قسم المنصة -->
    <div id="app-section">
        <div class="card">
            <h2 style="color:#f3ba2f;">TRUST</h2>
            <div style="font-size:12px; color:#848e9c;">رصيدك المتوفر</div>
            <div class="balance" id="user-balance">0.00 USDT</div>
        </div>
        <div class="card">
            <h4>تداول المهمة</h4>
            <div class="btn-group">
                <button style="background:#2ebd85; color:white" onclick="alert('تم الطلب')">LONG</button>
                <button style="background:#f6465d; color:white" onclick="alert('تم الطلب')">SHORT</button>
            </div>
        </div>
        <button onclick="auth.signOut()" style="background:none; color:grey;">خروج</button>
    </div>
</div>

<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBm9fQ1fDvhPD2_FpA1CUskHbKpgd-FNOc",
      authDomain: "://firebaseapp.com",
      projectId: "trust-d33d3",
      storageBucket: "trust-d33d3.firebasestorage.app",
      messagingSenderId: "880308194472",
      appId: "1:880308194472:web:944b9240623d4d359d469d"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let isLoginMode = true;

    function toggleMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-title').innerText = isLoginMode ? "تسجيل الدخول" : "إنشاء حساب جديد";
        document.getElementById('auth-btn').innerText = isLoginMode ? "دخول" : "تسجيل";
        document.getElementById('toggle-btn').innerText = isLoginMode ? "ليس لديك حساب؟ إنشاء حساب جديد" : "لديك حساب بالفعل؟ سجل دخولك";
        document.getElementById('ref-input-group').style.display = isLoginMode ? "none" : "block";
    }

    auth.onAuthStateChanged(user => {
        document.getElementById('auth-section').style.display = user ? 'none' : 'block';
        document.getElementById('app-section').style.display = user ? 'block' : 'none';
        if (user) loadData(user.uid);
    });

    async function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const status = document.getElementById('status');
        if(!email || !pass) { status.innerText = "يرجى تعبئة الحقول"; return; }

        try {
            if (isLoginMode) {
                await auth.signInWithEmailAndPassword(email, pass);
            } else {
                const res = await auth.createUserWithEmailAndPassword(email, pass);
                await db.collection('users').doc(res.user.uid).set({
                    email, balance: 0, referralCount: 0, myCode: res.user.uid.substring(0,6)
                });
            }
        } catch (err) { status.innerText = err.message; }
    }

    function loadData(uid) {
        db.collection('users').doc(uid).onSnapshot(doc => {
            if(doc.exists) document.getElementById('user-balance').innerText = doc.data().balance.toFixed(2) + " USDT";
        });
    }
</script>
</body>
</html>
