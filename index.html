<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRUST PLATFORM</title>
    <style>
        body { background-color: #0b0e11; color: white; font-family: sans-serif; margin: 0; text-align: center; }
        .card { background: #1e2329; padding: 25px; border-radius: 15px; margin: 50px auto; width: 85%; max-width: 400px; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #474d57; background: #2b2f36; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; background: #f3ba2f; cursor: pointer; }
        #app-section { display: none; }
        .toggle { color: #f3ba2f; cursor: pointer; margin-top: 15px; font-size: 13px; text-decoration: underline; }
    </style>
</head>
<body>

<div id="auth-section" class="card">
    <h2 style="color:#f3ba2f">TRUST</h2>
    <h4 id="title">تسجيل الدخول</h4>
    <input type="email" id="email" placeholder="البريد الإلكتروني">
    <input type="password" id="pass" placeholder="كلمة المرور">
    <button onclick="handleAuth()">استمرار</button>
    <div class="toggle" onclick="toggle()">إنشاء حساب جديد</div>
    <p id="err" style="color:#f6465d; font-size:12px; margin-top:10px;"></p>
</div>

<div id="app-section" class="card">
    <h2 style="color:#f3ba2f">TRUST</h2>
    <p>مرحباً بك، رصيدك الحالي:</p>
    <h1 id="bal" style="color:#2ebd85">0.00 USDT</h1>
    <button style="background:#333; color:white" onclick="location.reload()">تسجيل الخروج</button>
</div>

<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBm9fQ1fDvhPD2_FpA1CUskHbKpgd-FNOc",
      authDomain: "://firebaseapp.com",
      projectId: "trust-d33d3",
      storageBucket: "trust-d33d3.firebasestorage.app",
      messagingSenderId: "880308194472",
      appId: "1:880308194472:web:944b9240623d4d359d469d"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    let isLogin = true;

    function toggle() {
        isLogin = !isLogin;
        document.getElementById('title').innerText = isLogin ? "تسجيل الدخول" : "حساب جديد";
        document.getElementById('err').innerText = "";
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('app-section').style.display = 'block';
            db.collection('users').doc(user.uid).onSnapshot(doc => {
                if(doc.exists) document.getElementById('bal').innerText = doc.data().balance.toFixed(2) + " USDT";
                else { 
                    // إذا دخل المستخدم ولم يجد رصيد، نقوم بإنشاء سجل له فوراً
                    db.collection('users').doc(user.uid).set({email: user.email, balance: 0});
                }
            });
        }
    });

    async function handleAuth() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        const errDisplay = document.getElementById('err');
        errDisplay.innerText = "جاري العمل...";
        
        try {
            if(isLogin) { 
                await auth.signInWithEmailAndPassword(e, p); 
            } else {
                const r = await auth.createUserWithEmailAndPassword(e, p);
                await db.collection('users').doc(r.user.uid).set({email:e, balance:0});
            }
        } catch(err) { 
            errDisplay.innerText = "خطأ: " + err.message; 
        }
    }
</script>
</body>
</html>
